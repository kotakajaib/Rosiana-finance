<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Monitoring Keuangan Profesional</title>
    
    <script>window.process = { env: { NODE_ENV: 'production' } };</script>

    <!-- Library Inti -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/recharts@2.12.0/umd/Recharts.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a; 
        }
        .custom-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .custom-card:hover {
            border-color: #cbd5e1;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
        }
        .active-filter {
            background: #0f172a !important;
            color: white !important;
            border-color: #0f172a !important;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2) !important;
        }
        .status-pill {
            padding: 2px 10px;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        input[type="date"], select {
            font-size: 0.75rem;
            padding: 0.4rem 0.6rem;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0;
            outline: none;
            background-color: white;
            color: #475569;
            font-weight: 600;
        }
        input[type="date"]:focus, select:focus {
            border-color: #0f172a;
            color: #0f172a;
        }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = window.Recharts;

        const API_URL = "https://script.google.com/macros/s/AKfycbzGSOD89E3VmNwHPPLUca5ALAHefih8puvu_Tn9yvT30jP_C0oubdrJGVK3v3ilbYmsqA/exec";
        
        // REKENING UTAMA YANG WAJIB MUNCUL (Meskipun Saldo 0)
        const MAIN_ACCOUNTS = ["BANK JATENG", "BANK JAGO", "SEABANK", "CASH"];

        const formatRupiah = (num) => new Intl.NumberFormat('id-ID', { 
            style: 'currency', 
            currency: 'IDR', 
            minimumFractionDigits: 0 
        }).format(num);
        
        const formatDateShort = (dateStr) => {
            if (!dateStr) return "-";
            try { 
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return dateStr; 
                return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }); 
            } catch (e) { return dateStr; }
        };

        const Icons = {
            Wallet: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>,
            Refresh: () => <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>,
            History: () => <svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>,
            Calendar: () => <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
            ChevronLeft: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>,
            ChevronRight: () => <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>,
            Bank: () => <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M3 21h18"/><path d="M3 10h18"/><path d="m5 6 7-3 7 3"/><path d="M4 10v11"/><path d="M20 10v11"/><path d="M8 14v3"/><path d="M12 14v3"/><path d="M16 14v3"/></svg>,
            List: () => <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        };

        const App = () => {
            const [transactions, setTransactions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [refreshing, setRefreshing] = useState(false);
            
            // Filter States
            const [period, setPeriod] = useState('all'); 
            const [filterSource, setFilterSource] = useState(null);
            const [startDate, setStartDate] = useState("");
            const [endDate, setEndDate] = useState("");
            
            // Pagination
            const [currentPage, setCurrentPage] = useState(1);
            const [itemsPerPage, setItemsPerPage] = useState(10); 

            const fetchData = useCallback(async (silent = false) => {
                if (!silent) setLoading(true); else setRefreshing(true);
                try {
                    const res = await fetch(`${API_URL}?t=${Date.now()}`, { credentials: "omit" });
                    const data = await res.json();
                    if (Array.isArray(data)) {
                        const processed = data.map(item => {
                            // LOGIKA PEMBERSIHAN DATA (CLEANING)
                            // Ambil data apa adanya dari sheet, lalu bersihkan formatnya.
                            let rawAcc = (item.account || "CASH").toString().replace(/@/g, '').replace(/_/g, ' ').trim().toUpperCase();
                            
                            // Normalisasi Nama Rekening Utama (Agar konsisten)
                            if (rawAcc.includes("JATENG")) rawAcc = "BANK JATENG";
                            else if (rawAcc.includes("JAGO")) rawAcc = "BANK JAGO";
                            else if (rawAcc.includes("SEA")) rawAcc = "SEABANK";
                            else if (rawAcc.includes("CASH")) rawAcc = "CASH";
                            
                            return {
                                ...item,
                                amount: Number(item.amount || 0),
                                dateObj: new Date(item.timestamp),
                                officialSource: rawAcc
                            };
                        }).filter(t => !isNaN(t.dateObj.getTime()) && t.amount !== 0);
                        
                        processed.sort((a, b) => b.dateObj - a.dateObj);
                        setTransactions(processed);
                    }
                } catch (err) {
                    console.error("Fetch Error:", err);
                } finally {
                    setLoading(false);
                    setRefreshing(false);
                }
            }, []);

            useEffect(() => { fetchData(); }, [fetchData]);
            useEffect(() => { setCurrentPage(1); }, [period, filterSource, startDate, endDate, itemsPerPage]);

            const stats = useMemo(() => {
                // 1. Inisialisasi Saldo dengan Daftar Rekening Wajib (Agar tidak hilang)
                const accounts = {};
                MAIN_ACCOUNTS.forEach(name => {
                    accounts[name] = { name: name, total: 0 };
                });

                // 2. Hitung Saldo & Tambahkan Rekening Lain (Auto-Discovery)
                transactions.forEach(t => {
                    const accName = t.officialSource;
                    if (!accounts[accName]) {
                        accounts[accName] = { name: accName, total: 0 };
                    }
                    
                    if (t.type === 'IN') accounts[accName].total += t.amount;
                    else accounts[accName].total -= t.amount;
                });

                // Urutkan: Rekening Utama dulu, baru yang lain
                const sortedAccounts = Object.values(accounts).sort((a, b) => {
                    const idxA = MAIN_ACCOUNTS.indexOf(a.name);
                    const idxB = MAIN_ACCOUNTS.indexOf(b.name);
                    if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                    if (idxA !== -1) return -1;
                    if (idxB !== -1) return 1;
                    return a.name.localeCompare(b.name);
                });

                // 3. Filter Data untuk Tampilan
                let viewData = [...transactions];
                const now = new Date();

                if (filterSource) viewData = viewData.filter(t => t.officialSource === filterSource);

                if (startDate || endDate) {
                    setPeriod('custom');
                    const start = startDate ? new Date(startDate) : new Date(0);
                    const end = endDate ? new Date(endDate) : new Date(8640000000000000);
                    end.setHours(23, 59, 59, 999);
                    viewData = viewData.filter(t => t.dateObj >= start && t.dateObj <= end);
                } else {
                    if (period === 'month') viewData = viewData.filter(t => t.dateObj.getMonth() === now.getMonth() && t.dateObj.getFullYear() === now.getFullYear());
                    if (period === 'year') viewData = viewData.filter(t => t.dateObj.getFullYear() === now.getFullYear());
                }

                const income = viewData.filter(t => t.type === 'IN').reduce((s, t) => s + t.amount, 0);
                const expense = viewData.filter(t => t.type === 'OUT').reduce((s, t) => s + t.amount, 0);

                const catMap = {};
                viewData.filter(t => t.type === 'OUT').forEach(t => {
                    const c = (t.category || "UMUM").toUpperCase();
                    catMap[c] = (catMap[c] || 0) + t.amount;
                });
                const chartData = Object.keys(catMap).map(k => ({ name: k, value: catMap[k] })).sort((a,b) => b.value - a.value);

                return { 
                    income, expense, 
                    balance: income - expense, 
                    sources: sortedAccounts, 
                    chartData, viewData 
                };
            }, [transactions, period, filterSource, startDate, endDate]);

            const paginatedData = useMemo(() => {
                const startIndex = (currentPage - 1) * itemsPerPage;
                return stats.viewData.slice(startIndex, startIndex + itemsPerPage);
            }, [stats.viewData, currentPage, itemsPerPage]);

            const totalPages = Math.ceil(stats.viewData.length / itemsPerPage);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-white">
                    <div className="flex flex-col items-center gap-2">
                        <div className="w-8 h-8 border-[3px] border-slate-100 border-t-slate-900 rounded-full animate-spin"></div>
                        <p className="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Sinkronisasi Data...</p>
                    </div>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto px-6 py-10">
                    <header className="flex items-center justify-between mb-8">
                        <div>
                            <h1 className="text-xl font-extrabold tracking-tighter flex items-center gap-2">
                                <span className="bg-slate-900 text-white p-1 rounded-lg"><Icons.Wallet /></span>
                                Smart Finance
                            </h1>
                            <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Sistem Terintegrasi v4.1</p>
                        </div>
                        <button onClick={() => fetchData(true)} className="p-2 bg-white border border-slate-200 rounded-full hover:bg-slate-50 transition-all active:scale-95">
                            <div className={refreshing ? "animate-spin" : ""}><Icons.Refresh /></div>
                        </button>
                    </header>

                    {/* Sumber Dana Row - Dijamin Muncul */}
                    <section className="mb-8">
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                            <div onClick={() => setFilterSource(null)} className={`p-4 custom-card cursor-pointer flex flex-col justify-between h-20 ${!filterSource ? 'active-filter' : ''}`}>
                                <span className="text-[8px] font-bold uppercase opacity-60 tracking-wider">Net Balance</span>
                                <span className="text-sm font-black">{formatRupiah(stats.sources.reduce((s, a) => s + a.total, 0))}</span>
                            </div>
                            {stats.sources.map((acc, i) => (
                                <div key={i} onClick={() => setFilterSource(acc.name)} className={`p-4 custom-card cursor-pointer flex flex-col justify-between h-20 ${filterSource === acc.name ? 'active-filter' : ''}`}>
                                    <span className="text-[8px] font-bold uppercase opacity-60 truncate">{acc.name}</span>
                                    <span className={`text-sm font-black ${filterSource !== acc.name && acc.total < 0 ? 'text-rose-500' : ''}`}>{formatRupiah(acc.total)}</span>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Filter & Pagination Control */}
                    <section className="bg-white border border-slate-200 rounded-2xl p-4 mb-8 flex flex-col md:flex-row items-center justify-between gap-4 shadow-sm">
                        <div className="flex bg-slate-100 p-1 rounded-xl w-full md:w-auto">
                            {['all', 'month'].map(p => (
                                <button key={p} onClick={() => {setPeriod(p); setStartDate(""); setEndDate("");}} className={`flex-1 md:flex-none px-4 py-1.5 rounded-lg text-[9px] font-black uppercase transition-all ${period === p ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-400'}`}>
                                    {p === 'all' ? 'Semua' : 'Bulan Ini'}
                                </button>
                            ))}
                        </div>
                        
                        <div className="flex flex-wrap items-center gap-3 w-full md:w-auto justify-end">
                            <div className="flex items-center gap-2 text-[10px] font-bold text-slate-500 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">
                                <Icons.Calendar />
                                <input type="date" value={startDate} onChange={(e) => setStartDate(e.target.value)} className="bg-transparent border-none p-0 w-24" />
                                <span>-</span>
                                <input type="date" value={endDate} onChange={(e) => setEndDate(e.target.value)} className="bg-transparent border-none p-0 w-24" />
                            </div>
                            
                            <div className="flex items-center gap-2 text-[10px] font-bold text-slate-500 bg-slate-50 px-2 py-1 rounded-lg border border-slate-100">
                                <Icons.List />
                                <select 
                                    value={itemsPerPage} 
                                    onChange={(e) => setItemsPerPage(Number(e.target.value))}
                                    className="bg-transparent border-none p-0 outline-none cursor-pointer"
                                >
                                    <option value="10">10 Baris</option>
                                    <option value="15">15 Baris</option>
                                    <option value="20">20 Baris</option>
                                    <option value="50">50 Baris</option>
                                    <option value="100">100 Baris</option>
                                </select>
                            </div>
                        </div>
                    </section>

                    {/* Summary Row */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8 text-center">
                        <div className="p-4 custom-card border-b-4 border-b-emerald-500">
                            <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 text-center">Masuk</p>
                            <p className="text-lg font-black text-emerald-600">{formatRupiah(stats.income)}</p>
                        </div>
                        <div className="p-4 custom-card border-b-4 border-b-rose-500">
                            <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 text-center">Keluar</p>
                            <p className="text-lg font-black text-rose-600">{formatRupiah(stats.expense)}</p>
                        </div>
                        <div className="p-4 custom-card border-b-4 border-b-blue-500">
                            <p className="text-[8px] font-black text-slate-400 uppercase tracking-widest mb-1 text-center">Cash Flow</p>
                            <p className={`text-lg font-black ${stats.balance >= 0 ? 'text-blue-600' : 'text-orange-600'}`}>{formatRupiah(stats.balance)}</p>
                        </div>
                    </div>

                    {/* Transaction History */}
                    <div className="custom-card overflow-hidden bg-white shadow-sm">
                        <div className="px-6 py-4 border-b border-slate-50 flex items-center justify-between bg-slate-50/50">
                            <h3 className="font-extrabold text-slate-800 text-[10px] uppercase tracking-[0.2em] flex items-center gap-2">
                                <Icons.History /> Riwayat Mutasi
                            </h3>
                            <div className="text-[9px] font-black text-slate-400">
                                Total: {stats.viewData.length} Transaksi
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-[11px] border-collapse">
                                <thead className="text-[9px] font-black text-slate-400 uppercase tracking-widest bg-white border-b">
                                    <tr>
                                        <th className="px-4 py-4 w-10 text-center">No</th>
                                        <th className="px-6 py-4">Waktu</th>
                                        <th className="px-6 py-4">Kegiatan</th>
                                        <th className="px-6 py-4 text-center">Akun</th>
                                        <th className="px-6 py-4 text-right">Nominal</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-50">
                                    {paginatedData.map((t, i) => (
                                        <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                            <td className="px-4 py-5 align-top text-center font-bold text-slate-400">
                                                {(currentPage - 1) * itemsPerPage + i + 1}
                                            </td>
                                            <td className="px-6 py-5 align-top font-bold text-slate-500">
                                                {formatDateShort(t.timestamp)}
                                            </td>
                                            <td className="px-6 py-5 align-top">
                                                <div className="flex flex-col gap-1">
                                                    <span className={`status-pill w-fit ${t.type === 'IN' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}`}>
                                                        {t.category || "UMUM"}
                                                    </span>
                                                    <span className="text-slate-800 font-semibold">{t.description || "-"}</span>
                                                </div>
                                            </td>
                                            <td className="px-6 py-5 align-top text-center pt-7">
                                                <span className="px-2 py-1 bg-slate-100 text-slate-600 rounded text-[9px] font-black uppercase tracking-tighter border border-slate-200">
                                                    {t.officialSource}
                                                </span>
                                            </td>
                                            <td className={`px-6 py-5 align-top text-right pt-6 font-black text-sm ${t.type === 'IN' ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                {formatRupiah(t.amount).replace("Rp", "")}
                                            </td>
                                        </tr>
                                    ))}
                                    {stats.viewData.length === 0 && (
                                        <tr><td colSpan="5" className="px-6 py-12 text-center text-slate-400 font-bold text-xs uppercase tracking-widest">Data Tidak Ditemukan</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                        
                        {/* Pagination */}
                        {totalPages > 1 && (
                            <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
                                <span className="text-[9px] font-black text-slate-400 uppercase">
                                    Halaman {currentPage} dari {totalPages}
                                </span>
                                <div className="flex gap-1">
                                    <button 
                                        disabled={currentPage === 1}
                                        onClick={() => setCurrentPage(p => p - 1)}
                                        className="p-1.5 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 disabled:opacity-30 transition-all"
                                    >
                                        <Icons.ChevronLeft />
                                    </button>
                                    <button 
                                        disabled={currentPage === totalPages}
                                        onClick={() => setCurrentPage(p => p + 1)}
                                        className="p-1.5 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 disabled:opacity-30 transition-all"
                                    >
                                        <Icons.ChevronRight />
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    <footer className="mt-12 text-center">
                        <p className="text-[9px] font-black uppercase tracking-[0.6em] text-slate-300">Scalable Financial System • Fixed Data Sync</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
